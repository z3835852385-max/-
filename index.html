<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模拟嘉豪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  overflow:hidden;
  height:100vh;
}
canvas{
  display:block;
  width:100vw;
  height:100vh;
}
audio{
  display:none;
}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<audio id="bgMusic" loop>
  <source src="Iludeke.mp3" type="audio/mpeg">

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const audio = document.getElementById('bgMusic');

// 画布适配
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// 1. 数字雨
const chars = '01';
const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

// 2. 股票滚动K线配置
let audioCtx, analyser, dataArray;
// 存储所有K线数据，实现滚动
let barList = [];
const barWidth = 8;
const barGap = 2;
const barCenterY = canvas.height - 80;
const maxBarHeight = 280;
// 滚动速度
const scrollSpeed = 1.2;

// 点击播放初始化音频
document.addEventListener('click', ()=>{
  audio.play().catch(e=>console.log("播放失败：",e));
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
  }
},{once:true}); 

// 主渲染
function draw(){
  // 绘制数字雨
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0f0';
  ctx.font = fontSize+'px monospace';

  for(let i=0;i<columns;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>canvas.height && Math.random()>0.97){
      drops[i]=0;
    }
    drops[i]++;
  }

  // 股票滚动K线
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    // 取平均音量作为当前K线高度
    let avg = 0;
    for(let v of dataArray) avg += v;
    avg /= dataArray.length;
    const h = (avg / 255) * maxBarHeight;

    // 新增一根K线，放到最右侧
    barList.push({
      x: canvas.width,
      height: h,
      isUp: h > maxBarHeight/2
    });

    // 所有K线向左滚动
    barList.forEach(bar=>{
      bar.x -= scrollSpeed;
    });

    // 清除移出屏幕的K线
    barList = barList.filter(b=>b.x > -barWidth);

    // 绘制所有K线
    barList.forEach(bar=>{
      if(bar.isUp){
        // 红柱向上
        ctx.fillStyle = "#ff3333";
        const y = barCenterY - bar.height;
        ctx.fillRect(bar.x, y, barWidth, bar.height);
        ctx.fillRect(bar.x+barWidth/2-1, y-4, 2, 4);
      }else{
        // 绿柱向下
        ctx.fillStyle = "#00dd66";
        const y = barCenterY;
        ctx.fillRect(bar.x, y, barWidth, bar.height);
        ctx.fillRect(bar.x+barWidth/2-1, y+bar.height, 2, 4);
      }
      // 基准线小刻度
      ctx.fillStyle = '#aaa';
      ctx.fillRect(bar.x+barWidth/2-2, barCenterY, 4, 2);
    });
  }

  requestAnimationFrame(draw);
}
draw();

// 窗口变化重置
window.addEventListener('resize',()=>{
  resize();
  columns = Math.floor(canvas.width / fontSize);
  drops = Array(columns).fill(1);
  barList = [];
});
</script>
</body>
</html>
