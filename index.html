<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模拟嘉豪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  overflow:hidden;
  height:100vh;
}
canvas{
  display:block;
  width:100vw;
  height:100vh;
}
/* 隐藏音频控件 */
audio{
  display:none;
}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<!-- 本地音频 Iludeke.mp3，和html同目录 -->
<audio id="bgMusic" loop>
  <source src="Iludeke.mp3" type="audio/mpeg">

<script>
// 二进制雨 + 股票形态音频可视化
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const audio = document.getElementById('bgMusic');

// 画布自适应
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// 1. 数字雨配置
const chars = '01';
const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

// 2. 音频可视化配置（股票K线柱状）
let audioCtx, analyser, dataArray;
const barCount = 45; // 股票柱子数量
const barWidth = canvas.width / barCount - 2;
const barBottom = canvas.height - 80; // 音频条底部位置
const maxBarHeight = 300; // 最大高度

// 点击初始化音频
document.addEventListener('click', ()=>{
  audio.play().catch(e=>console.log("播放失败：",e));
  // 音频上下文
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
  }
},{once:true}); 

// 主渲染循环
function draw(){
  // ---------- 绘制数字雨 ----------
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0f0';
  ctx.font = fontSize+'px monospace';

  for(let i=0;i<columns;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>canvas.height && Math.random()>0.97){
      drops[i]=0;
    }
    drops[i]++;
  }

  // ---------- 绘制股票形态音频条 ----------
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    const step = Math.floor(dataArray.length / barCount);

    for(let i=0;i<barCount;i++){
      // 频率值转高度
      const val = dataArray[i*step] || 0;
      const h = (val / 255) * maxBarHeight;
      const x = i*(barWidth+2);
      const y = barBottom - h;

      // 股票风格：上涨红色，下跌绿色
      ctx.fillStyle = h>maxBarHeight/2 ? "#ff3333" : "#00dd66";
      // 主柱子
      ctx.fillRect(x, y, barWidth, h);
      // 上下影线（股票K线效果）
      ctx.fillRect(x+barWidth/2-1, y-4, 2, 4);
      ctx.fillRect(x+barWidth/2-1, barBottom, 2, 4);
    }
  }

  requestAnimationFrame(draw);
}
draw();

// 窗口大小变化重置
window.addEventListener('resize',()=>{
  resize();
  columns = Math.floor(canvas.width / fontSize);
  drops = Array(columns).fill(1);
});
</script>
</body>
</html>
